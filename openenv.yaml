name: "EV Charging Scheduler"
version: "1.0.0"
author: "AI Engineering Team"

description: |
  A production-level OpenEnv environment for optimizing electric vehicle charging
  across multiple charging stations. The agent must balance multiple objectives:
  - Minimize total energy cost
  - Avoid grid overload
  - Maximize charging efficiency
  - Prioritize urgent vehicles
  - Meet vehicle charging deadlines

category: "optimization"
domain: "smart-grid"
difficulty_levels:
  - easy
  - medium
  - hard

openenv_spec_version: "1.0"
environment_type: "simulator"

action_space:
  type: "discrete"
  description: "Assign vehicles to charging stations or delay charging"
  schema:
    action_type:
      type: "string"
      enum: ["assign", "delay"]
    vehicle_id:
      type: "integer"
      ge: 0
    station_id:
      type: "integer"
      ge: 0
    power_level:
      type: "float"
      ge: 0.0
      le: 1.0
      default: 1.0
    duration:
      type: "integer"
      ge: 1
      default: 1

observation_space:
  type: "dict"
  description: "Full system state including vehicles, stations, and grid"
  schema:
    time_step:
      type: "integer"
      ge: 0
    vehicles:
      type: "array"
      items:
        type: "object"
        properties:
          id:
            type: "integer"
          battery_level:
            type: "float"
          required_charge:
            type: "float"
          deadline:
            type: "integer"
          priority:
            type: "string"
          arrival_time:
            type: "integer"
          fully_charged:
            type: "boolean"
    stations:
      type: "array"
      items:
        type: "object"
        properties:
          id:
            type: "integer"
          max_slots:
            type: "integer"
          max_power:
            type: "float"
          occupied_slots:
            type: "integer"
          available_power:
            type: "float"
    grid:
      type: "object"
      properties:
        current_load:
          type: "float"
        max_load:
          type: "float"
        electricity_price:
          type: "float"
        time_step:
          type: "integer"
    total_reward:
      type: "float"

reward_space:
  type: "float"
  range: [-1.0, 1.0]
  description: "Normalized reward combining charging efficiency, cost, and deadline adherence"

parameters:
  num_vehicles:
    type: "integer"
    default: 10
    min: 1
  num_stations:
    type: "integer"
    default: 5
    min: 1
  max_steps:
    type: "integer"
    default: 200
    min: 10
  slots_per_station:
    type: "integer"
    default: 3
    min: 1
  max_power_per_station:
    type: "float"
    default: 150.0
  max_grid_load:
    type: "float"
    default: 1.0
  base_electricity_price:
    type: "float"
    default: 0.15
  price_volatility:
    type: "float"
    default: 0.3
  seed:
    type: "integer"
    nullable: true

# ── TASKS WITH GRADERS (required for Phase 2) ──
tasks:
  - name: easy_charging
    entrypoint: ev_charging_env.tasks.simple_tasks:create_easy_task
    grader: ev_charging_env.tasks.simple_tasks:grade_easy

  - name: medium_charging
    entrypoint: ev_charging_env.tasks.simple_tasks:create_medium_task
    grader: ev_charging_env.tasks.simple_tasks:grade_medium

  - name: hard_charging
    entrypoint: ev_charging_env.tasks.simple_tasks:create_hard_task
    grader: ev_charging_env.tasks.simple_tasks:grade_hard

api:
  step:
    description: "Execute one environment step with an action"
    input: "action (Dict with action_type, vehicle_id, station_id, power_level)"
    output: "observation, reward (float), done (bool), info (dict)"
  reset:
    description: "Reset environment and return initial observation"
    input: "none"
    output: "initial observation"
  state:
    description: "Get current observation without stepping"
    input: "none"
    output: "current observation"

requirements:
  cpu: "2 vCPU minimum"
  memory: "8GB RAM minimum"
  gpu: "optional"
  python_version: ">=3.8"
  dependencies:
    - pydantic
    - numpy

determinism:
  enabled: true
  seed_support: true
  reset_resets_seed: true

compliance:
  openenv: true
  gym_compatible: true
  typed_models: true